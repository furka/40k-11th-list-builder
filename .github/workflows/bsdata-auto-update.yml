name: BSData auto-update

on:
  schedule:
    # Daily at 14:00 UTC — 1 hour after MFM auto-update so PR diffs don't
    # collide on the same minute.
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      refresh:
        description: "Bypass scraper caches (re-fetch all .cat files from upstream)"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: bsdata-auto-update
  cancel-in-progress: false

jobs:
  scrape-and-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Restore scraper cache
        uses: actions/cache@v4
        with:
          path: |
            scripts/scrape-bsdata-keywords/.cache
            scripts/scrape-bsdata-enhancements/.cache
            scripts/scrape-bsdata-wargear/.cache
          key: bsdata-scrape-cache-${{ hashFiles('scripts/scrape-bsdata-keywords/**/*.mjs', 'scripts/scrape-bsdata-keywords/faction-mapping.json', 'scripts/scrape-bsdata-enhancements/**/*.mjs', 'scripts/scrape-bsdata-wargear/**/*.mjs') }}
          restore-keys: |
            bsdata-scrape-cache-

      - name: Install dependencies
        run: npm ci

      - name: Run BSData scrapers
        run: |
          if [ "${{ inputs.refresh }}" = "true" ]; then
            npm run bsdata:scrape:refresh
            npm run bsdata:enhancements:refresh
            npm run bsdata:wargear:refresh
          else
            npm run bsdata:scrape
            npm run bsdata:enhancements
            npm run bsdata:wargear
          fi

      - name: Reconcile manual overrides
        run: npm run bsdata:prune-overrides

      - name: Detect changes
        id: changes
        run: node scripts/bsdata-detect-changes.mjs

      - name: Discard metadata-only churn
        if: steps.changes.outputs.changed == 'true' && steps.changes.outputs.metadata_only != ''
        run: git checkout -- ${{ steps.changes.outputs.metadata_only }}

      - name: Open or update PR
        if: steps.changes.outputs.changed == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.AUTO_PR_TOKEN }}
          branch: bsdata-auto-update
          base: main
          commit-message: "chore(bsdata): auto-update from BSData/wh40k-10e@${{ steps.changes.outputs.short }}"
          title: "chore(bsdata): auto-update from BSData/wh40k-10e@${{ steps.changes.outputs.short }}"
          body: |
            Automated BSData scrape detected changes across one or more outputs.

            - **Source:** [BSData/wh40k-10e@${{ steps.changes.outputs.short }}](https://github.com/BSData/wh40k-10e/commit/${{ steps.changes.outputs.sha }})
            - **Upstream committed at:** `${{ steps.changes.outputs.committed }}`
            - **Scrape run:** [view logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            Files that may be in this diff:
            - `src/data/keywords/bsdata-keywords.auto.json` — per-datasheet keywords
            - `src/data/configs/enhancement-restrictions.bsdata.auto.json` — enhancement eligibility rules
            - `src/data/configs/wargear-restrictions.bsdata.auto.json` — wargear option caps
            - `src/data/keywords/manual-overrides.json` — may be touched by the prune reconciliation step (`npm run bsdata:prune-overrides`) that runs after the three scrapers

            Tests run via the `pr-tests` workflow gate the merge.
          labels: |
            bsdata
            automated
          delete-branch: false
